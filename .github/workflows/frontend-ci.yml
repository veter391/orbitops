name: frontend-ci

on:
  push:
    paths:
      - 'src/**'
      - 'test/**'
      - 'index.html'
      - 'worker.js'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'index.html'
      - 'worker.js'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  e2e:
    # End-to-end + accessibility gate: the real app served statically, driven in
    # real browsers, with an axe-core scan (serious/critical = fail) on every
    # primary page. Runs offline — external hosts are blocked in the specs, so
    # the catalog exercises the bundled-snapshot path deterministically.
    # Cross-engine: every spec runs on Chromium, Firefox and WebKit (the Safari
    # stand-in) so engine-specific breakage fails CI before an operator sees it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

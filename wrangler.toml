# Cloudflare Workers deploy config for OrbitOps.
#
# The site is a zero-build static SPA served by Cloudflare's Static Assets, with
# ONE dynamic route: `worker.js` proxies `POST /api/ai` to OpenRouter using a
# server-only secret (the shared, no-BYOK live-AI mode). Everything else falls
# through to the static assets (`env.ASSETS.fetch`). See docs/DEPLOY.md.
#
# Deploy:  npx wrangler deploy
# Secret:  npx wrangler secret put OPENROUTER_KEY     # shared live-AI (optional)

name = "orbitops"
main = "worker.js"
# 2025+ compat date for the Containers runtime + the `cloudflare:workers` env import.
compatibility_date = "2025-05-01"

# Custom domain: serve the demo at orbitops.shypot.com (the owner's portfolio
# zone). Cloudflare creates the DNS record + auto-provisions TLS. workers_dev is
# kept enabled as a fallback URL (orbitops.<sub>.workers.dev).
workers_dev = true
routes = [
  { pattern = "orbitops.shypot.com", custom_domain = true }
]

# Serve the repository as the static site. Routing is History-API based (clean
# URLs, no #), so `not_found_handling` below resolves every deep path to the SPA.
# `.assetsignore` keeps non-served files (backend, docs, tooling) out of the upload.
[assets]
directory = "."
binding = "ASSETS"
# Clean URLs: serve index.html for any non-file path so history-API routes
# (/cockpit, /docs/going-live) resolve on deep-link and refresh. The API/health
# paths must reach the Worker (→ container) FIRST, before this SPA fallback.
# The app ROUTES are also worker-first so the Worker can rewrite the served
# HTML's title/description/canonical/og per route for crawlers (worker.js
# rewriteRouteMeta). "/" stays on the free static path — index.html already
# carries the home metadata — and static assets (src/, public/, …) never hit
# the Worker, so they stay free and cached as before.
not_found_handling = "single-page-application"
run_worker_first = [
  "/v1/*", "/health", "/api/ai",
  "/cockpit", "/agent", "/dashboard", "/tools", "/pricing", "/settings",
  "/docs", "/docs/*",
]

# LIVE BACKEND — the Node backend (backend/Dockerfile) runs in a Cloudflare
# Container fronted by this Worker; worker.js routes /v1/* + /health to it. The
# container is a Durable Object (required) using a SQLite class + migration.
# pglite reseeds on boot (ephemeral) — correct for a public demo.
# Single instance: the demo backend keeps state in the container's own ephemeral
# pglite DB (reseeded on boot), so all requests must hit ONE instance for a
# consistent view. A managed external DB would be needed to scale past one.
[[containers]]
class_name = "Backend"
image = "./backend/Dockerfile"
max_instances = 1
instance_type = "basic"
name = "orbitops-backend"

[[durable_objects.bindings]]
name = "BACKEND"
class_name = "Backend"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Backend"]

# Optional: a per-IP rate limit on the shared /api/ai proxy so the free key can't
# be drained. The worker degrades gracefully if this binding is absent, so it is
# safe to remove this block if your account doesn't have the rate-limiting binding.
[[unsafe.bindings]]
name = "AI_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

[observability]
enabled = true

# Local `wrangler dev` runs the static site + worker only. Containers can't run
# in local dev on Windows (wrangler's own guidance is to disable them), and
# worker.js already guards every backend route on `env.BACKEND`, so the app
# behaves like a plain static deploy locally. Production deploys are unaffected
# ([dev] applies only to `wrangler dev`).
[dev]
enable_containers = false

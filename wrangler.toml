# Cloudflare Workers deploy config for OrbitOps.
#
# The site is a zero-build static SPA served by Cloudflare's Static Assets, with
# ONE dynamic route: `worker.js` proxies `POST /api/ai` to OpenRouter using a
# server-only secret (the shared, no-BYOK live-AI mode). Everything else falls
# through to the static assets (`env.ASSETS.fetch`). See docs/DEPLOY.md.
#
# Deploy:  npx wrangler deploy
# Secret:  npx wrangler secret put OPENROUTER_KEY     # shared live-AI (optional)

name = "orbitops"
main = "worker.js"
compatibility_date = "2024-11-01"

# Serve the repository as the static site. The SPA is hash-routed (#/route), so
# every route resolves to index.html client-side — no SPA fallback rule needed.
# `.assetsignore` keeps non-served files (backend, docs, tooling) out of the upload.
[assets]
directory = "."
binding = "ASSETS"

# Optional: a per-IP rate limit on the shared /api/ai proxy so the free key can't
# be drained. The worker degrades gracefully if this binding is absent, so it is
# safe to remove this block if your account doesn't have the rate-limiting binding.
[[unsafe.bindings]]
name = "AI_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

[observability]
enabled = true

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>OrbitOps mark</title>
  <!-- Three concentric orbital rings; middle ring offset = observation/prediction -->
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <!-- Middle ring (offset, brighter — the "AI" layer) -->
  <ellipse cx="32" cy="32" rx="20" ry="22" stroke="#00d4ff" stroke-width="2.5" fill="none"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="12" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  <!-- Center node (the satellite / decision point) -->
  <circle cx="32" cy="32" r="3" fill="#00d4ff"/>
  <circle cx="32" cy="32" r="6" fill="#00d4ff" opacity="0.2"/>
  <!-- Satellite track indicator (small dot on outer ring) -->
  <circle cx="60" cy="32" r="2" fill="#00d4ff"/>
  <!-- Tracking line from center to satellite -->
  <line x1="32" y1="32" x2="58" y2="32" stroke="#00d4ff" stroke-width="0.75" opacity="0.5"/>
</svg>